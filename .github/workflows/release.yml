name: Release

# Only rebuild and publish binaries when source code actually changes
# and lands in main. Documentation-only or config-only commits should not
# trigger a release (CI tests still run via ci.yml).
on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'tests/**'
      - 'build.rs'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - '.cargo/**'
      - '.github/workflows/release.yml'

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  CARGO_PROFILE_RELEASE_DEBUG: 0

# Prevent two releases racing if commits land back-to-back
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: iam-recon-linux-x86_64
            deb_arch: amd64
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-24.04-arm
            artifact: iam-recon-linux-aarch64
            deb_arch: arm64
          - target: x86_64-apple-darwin
            os: macos-latest
            artifact: iam-recon-macos-x86_64
          - target: aarch64-apple-darwin
            os: macos-latest
            artifact: iam-recon-macos-aarch64
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      # Fast linker for Linux — 30-90s faster link time on release builds
      - name: Install mold linker (Linux only)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y mold clang

      # One cache slot per (OS, target) tuple so each platform has warm
      # artifacts without thrashing each other.
      # `save-if: main` ensures only pushes update the cache — reruns of the
      # same commit still hit the cache but don't rewrite it.
      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "iam-recon-release-${{ matrix.target }}"
          cache-on-failure: true
          save-if: ${{ github.ref == 'refs/heads/main' }}
          cache-all-crates: true

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }} --locked

      - name: Package binary
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/iam-recon dist/${{ matrix.artifact }}
          chmod +x dist/${{ matrix.artifact }}

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.artifact }}

      # ── Debian package (Linux targets only) ──
      # Use taiki-e/install-action to pull a pre-built cargo-deb binary from
      # its GitHub release instead of compiling from source (~2-3 min saved).
      - name: Install cargo-deb (prebuilt)
        if: runner.os == 'Linux'
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-deb

      - name: Build .deb package
        if: runner.os == 'Linux'
        run: cargo deb --target ${{ matrix.target }} --no-build

      - name: Stage .deb for upload
        if: runner.os == 'Linux'
        run: |
          mkdir -p dist-deb
          cp target/${{ matrix.target }}/debian/iam-recon_*_${{ matrix.deb_arch }}.deb dist-deb/iam-recon_${{ matrix.deb_arch }}.deb

      - name: Upload .deb artifact
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: iam-recon-deb-${{ matrix.deb_arch }}
          path: dist-deb/iam-recon_${{ matrix.deb_arch }}.deb

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
      version: ${{ steps.tag.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Compute tag
        id: tag
        run: |
          VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
          SHA=$(git rev-parse --short HEAD)
          TAG="v${VERSION}-${SHA}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: IAM Recon ${{ steps.tag.outputs.version }}
          generate_release_notes: true
          files: |
            artifacts/iam-recon-linux-x86_64/iam-recon-linux-x86_64
            artifacts/iam-recon-linux-aarch64/iam-recon-linux-aarch64
            artifacts/iam-recon-macos-x86_64/iam-recon-macos-x86_64
            artifacts/iam-recon-macos-aarch64/iam-recon-macos-aarch64
            artifacts/iam-recon-deb-amd64/iam-recon_amd64.deb
            artifacts/iam-recon-deb-arm64/iam-recon_arm64.deb

  # ── Homebrew formula (single-repo tap) ──
  # This repo doubles as the Homebrew tap. After each release publish, fetch
  # the binaries we just uploaded, hash them, regenerate Formula/iam-recon.rb,
  # and commit it back to main. Users tap with the explicit URL form:
  #
  #   brew tap andrewkrug/iam-recon https://github.com/andrewkrug/iam-recon
  #   brew install andrewkrug/iam-recon/iam-recon
  #
  # The formula commit uses [skip ci] so it doesn't trigger ci.yml. release.yml
  # already ignores Formula/** via its paths filter, so no infinite loop risk.
  homebrew:
    name: Update Homebrew formula
    needs: release
    runs-on: ubuntu-latest
    if: needs.release.result == 'success'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 1
          # Persist the default GITHUB_TOKEN so the later git push works.
          persist-credentials: true

      - name: Wait for release assets to be queryable
        # softprops/action-gh-release returns before the GitHub CDN has the
        # asset URLs hot. A short pause avoids a 404 on the curl below.
        run: sleep 15

      - name: Generate formula
        env:
          TAG: ${{ needs.release.outputs.tag }}
          VERSION: ${{ needs.release.outputs.version }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          base="https://github.com/${REPO}/releases/download/${TAG}"
          tmp=$(mktemp -d)
          for f in iam-recon-macos-aarch64 iam-recon-macos-x86_64 \
                   iam-recon-linux-aarch64 iam-recon-linux-x86_64; do
            curl -fSL "${base}/${f}" -o "${tmp}/${f}"
          done
          sha_macos_arm=$(sha256sum "${tmp}/iam-recon-macos-aarch64" | awk '{print $1}')
          sha_macos_x86=$(sha256sum "${tmp}/iam-recon-macos-x86_64"  | awk '{print $1}')
          sha_linux_arm=$(sha256sum "${tmp}/iam-recon-linux-aarch64" | awk '{print $1}')
          sha_linux_x86=$(sha256sum "${tmp}/iam-recon-linux-x86_64"  | awk '{print $1}')

          mkdir -p Formula
          cat > Formula/iam-recon.rb <<EOF
          class IamRecon < Formula
            desc "AWS IAM privilege escalation and attack path mapper"
            homepage "https://github.com/${REPO}"
            version "${VERSION}"
            license "Apache-2.0"

            on_macos do
              if Hardware::CPU.arm?
                url "${base}/iam-recon-macos-aarch64"
                sha256 "${sha_macos_arm}"
              else
                url "${base}/iam-recon-macos-x86_64"
                sha256 "${sha_macos_x86}"
              end
            end

            on_linux do
              if Hardware::CPU.arm?
                url "${base}/iam-recon-linux-aarch64"
                sha256 "${sha_linux_arm}"
              else
                url "${base}/iam-recon-linux-x86_64"
                sha256 "${sha_linux_x86}"
              end
            end

            def install
              bin.install Dir["*"].first => "iam-recon"
            end

            test do
              system "#{bin}/iam-recon", "--version"
            end
          end
          EOF
          echo "formula written:"
          cat Formula/iam-recon.rb

      - name: Commit formula back to main
        env:
          TAG: ${{ needs.release.outputs.tag }}
        run: |
          set -euo pipefail
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if git diff --quiet -- Formula/iam-recon.rb; then
            echo "Formula unchanged — nothing to push."
            exit 0
          fi

          git add Formula/iam-recon.rb
          git commit -m "homebrew: update formula for ${TAG} [skip ci]"

          # Retry with rebase in case main moved while the build was running.
          # Concurrency on the release job serializes our own runs, but a
          # human merge can land in between.
          for attempt in 1 2 3; do
            if git push origin HEAD:main; then
              echo "pushed on attempt ${attempt}"
              exit 0
            fi
            echo "push rejected, rebasing..."
            git fetch origin main
            git rebase origin/main || { git rebase --abort; exit 1; }
          done
          echo "failed to push formula after 3 attempts"
          exit 1
