name: Release

# Only rebuild and publish binaries when source code actually changes
# and lands in main. Documentation-only or config-only commits should not
# trigger a release (CI tests still run via ci.yml).
on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'tests/**'
      - 'build.rs'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - '.cargo/**'
      - '.github/workflows/release.yml'

env:
  CARGO_TERM_COLOR: always
  # Don't waste cache disk on incremental; rust-cache gives us a better story
  CARGO_INCREMENTAL: 0
  # Release builds don't need debuginfo — smaller binaries, smaller cache
  CARGO_PROFILE_RELEASE_DEBUG: 0
  # RUSTC_WRAPPER is set conditionally below after sccache health check

# Prevent two releases racing if commits land back-to-back
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: iam-recon-linux-x86_64
          - target: x86_64-apple-darwin
            os: macos-latest
            artifact: iam-recon-macos-x86_64
          - target: aarch64-apple-darwin
            os: macos-latest
            artifact: iam-recon-macos-aarch64
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      # Fast linker for Linux — 30-90s faster link time on release builds
      - name: Install mold linker (Linux only)
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get update && sudo apt-get install -y mold clang

      # Compilation-unit cache — complementary to rust-cache (target/).
      # continue-on-error so a transient GitHub cache service outage doesn't
      # block a release build; we fall through to plain cargo in that case.
      - name: Setup sccache
        id: sccache
        continue-on-error: true
        uses: mozilla-actions/sccache-action@v0.0.6

      - name: Enable sccache wrapper if healthy
        if: steps.sccache.outcome == 'success'
        shell: bash
        run: |
          if sccache --show-stats >/dev/null 2>&1; then
            echo "RUSTC_WRAPPER=sccache" >> "$GITHUB_ENV"
            echo "SCCACHE_GHA_ENABLED=true" >> "$GITHUB_ENV"
            echo "sccache: enabled"
          else
            echo "sccache: startup failed, building without it"
          fi

      # One cache slot per (OS, target) tuple so linux/macos-x86/macos-aarch
      # each have warm artifacts without thrashing each other.
      # `save-if: main` ensures only pushes update the cache — reruns of the
      # same commit still hit the cache but don't rewrite it.
      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "iam-recon-release-${{ matrix.target }}"
          cache-on-failure: true
          save-if: ${{ github.ref == 'refs/heads/main' }}
          cache-all-crates: true

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }} --locked

      - name: Package binary
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/iam-recon dist/${{ matrix.artifact }}
          chmod +x dist/${{ matrix.artifact }}

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.artifact }}

      # ── Debian package (Linux x86_64 only) ──
      # Use taiki-e/install-action to pull a pre-built cargo-deb binary from
      # its GitHub release instead of compiling from source (~2-3 min saved).
      - name: Install cargo-deb (prebuilt)
        if: matrix.target == 'x86_64-unknown-linux-gnu'
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-deb

      - name: Build .deb package
        if: matrix.target == 'x86_64-unknown-linux-gnu'
        run: cargo deb --target ${{ matrix.target }} --no-build

      - name: Stage .deb for upload
        if: matrix.target == 'x86_64-unknown-linux-gnu'
        run: |
          mkdir -p dist-deb
          cp target/${{ matrix.target }}/debian/iam-recon_*_amd64.deb dist-deb/iam-recon_amd64.deb

      - name: Upload .deb artifact
        if: matrix.target == 'x86_64-unknown-linux-gnu'
        uses: actions/upload-artifact@v4
        with:
          name: iam-recon-deb
          path: dist-deb/iam-recon_amd64.deb

      - name: sccache stats
        if: env.RUSTC_WRAPPER == 'sccache'
        shell: bash
        run: sccache --show-stats || true

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Compute tag
        id: tag
        run: |
          VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
          SHA=$(git rev-parse --short HEAD)
          TAG="v${VERSION}-${SHA}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: IAM Recon ${{ steps.tag.outputs.version }}
          generate_release_notes: true
          files: |
            artifacts/iam-recon-linux-x86_64/iam-recon-linux-x86_64
            artifacts/iam-recon-macos-x86_64/iam-recon-macos-x86_64
            artifacts/iam-recon-macos-aarch64/iam-recon-macos-aarch64
            artifacts/iam-recon-deb/iam-recon_amd64.deb
