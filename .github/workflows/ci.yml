name: CI

# Runs on every push to main and every PR against main.
# Purpose: fast feedback on correctness. Does not build release binaries
# or publish anything — that's handled by release.yml.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  # Disable incremental compilation — with rust-cache it's wasted disk
  CARGO_INCREMENTAL: 0
  # Faster CI builds: don't bother with full debug info
  CARGO_PROFILE_DEV_DEBUG: 0
  CARGO_PROFILE_TEST_DEBUG: 0

# Cancel superseded runs — if a new commit pushes to a PR, kill the old run
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Check, Lint & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      # Fast linker for Linux — 30-90s faster link time on release builds
      - name: Install mold linker
        run: sudo apt-get update && sudo apt-get install -y mold clang

      # rust-cache covers target/ and ~/.cargo. We previously layered sccache
      # on top via the GHA cache backend, but that backend is flaky enough to
      # crash mid-build (`Server startup failed: cache storage failed to read`),
      # which fails the whole job for no real speed win on top of rust-cache.
      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "iam-recon-ci"
          cache-on-failure: true
          save-if: ${{ github.ref == 'refs/heads/main' }}
          cache-all-crates: true

      - name: Format check
        run: cargo fmt -- --check
      - name: Type check
        run: cargo check --all-targets --locked
      - name: Clippy
        run: cargo clippy --all-targets --locked -- -W clippy::all
      - name: Unit + integration tests
        run: cargo test --locked
