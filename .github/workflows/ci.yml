name: CI

# Runs on every push to main and every PR against main.
# Purpose: fast feedback on correctness. Does not build release binaries
# or publish anything — that's handled by release.yml.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  # Disable incremental compilation — with rust-cache it's wasted disk
  CARGO_INCREMENTAL: 0
  # Faster CI builds: don't bother with full debug info
  CARGO_PROFILE_DEV_DEBUG: 0
  CARGO_PROFILE_TEST_DEBUG: 0

# Cancel superseded runs — if a new commit pushes to a PR, kill the old run
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Check, Lint & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      # Swatinem/rust-cache handles ~/.cargo/registry, ~/.cargo/git, and target/.
      # `shared-key` lets this CI job share the same cache slot across runs.
      # `cache-on-failure` saves cache even when a job fails (so the next
      # attempt starts with warmed artifacts). `save-if` prevents PRs from
      # polluting the cache — only main pushes update it, PRs read-only.
      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "iam-recon-ci"
          cache-on-failure: true
          save-if: ${{ github.ref == 'refs/heads/main' }}
          cache-all-crates: true

      - name: Format check
        run: cargo fmt -- --check
      - name: Type check
        run: cargo check --all-targets --locked
      - name: Clippy
        run: cargo clippy --all-targets --locked -- -W clippy::all
      - name: Unit + integration tests
        run: cargo test --locked
