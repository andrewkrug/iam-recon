name: CI

# Runs on every push to main and every PR against main.
# Purpose: fast feedback on correctness. Does not build release binaries
# or publish anything — that's handled by release.yml.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  # Disable incremental compilation — with rust-cache it's wasted disk
  CARGO_INCREMENTAL: 0
  # Faster CI builds: don't bother with full debug info
  CARGO_PROFILE_DEV_DEBUG: 0
  CARGO_PROFILE_TEST_DEBUG: 0
  # NOTE: RUSTC_WRAPPER is set conditionally below — only if sccache actually
  # starts. If GitHub's artifact cache service is degraded, we fall through
  # to vanilla cargo instead of hard-failing the whole build.

# Cancel superseded runs — if a new commit pushes to a PR, kill the old run
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Check, Lint & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      # Fast linker for Linux — 30-90s faster link time on release builds
      - name: Install mold linker
        run: sudo apt-get update && sudo apt-get install -y mold clang

      # Compilation-unit cache — complementary to rust-cache (target/).
      # rust-cache handles target/ and ~/.cargo; sccache caches individual
      # crate compilation results keyed by source hash.
      # continue-on-error: if GitHub's artifact cache service is down,
      # the step fails but we carry on without sccache instead of crashing
      # the whole build.
      - name: Setup sccache
        id: sccache
        continue-on-error: true
        uses: mozilla-actions/sccache-action@v0.0.6

      - name: Enable sccache wrapper if healthy
        if: steps.sccache.outcome == 'success'
        env:
          SCCACHE_GHA_ENABLED: "true"
        run: |
          # Stop any server that started without the GHA backend, then test
          # with SCCACHE_GHA_ENABLED so the health check actually exercises
          # the GitHub Actions cache service.
          sccache --stop-server >/dev/null 2>&1 || true
          if sccache --show-stats >/dev/null 2>&1; then
            echo "RUSTC_WRAPPER=sccache" >> "$GITHUB_ENV"
            echo "SCCACHE_GHA_ENABLED=true" >> "$GITHUB_ENV"
            echo "sccache: enabled (GHA backend healthy)"
          else
            echo "sccache: GHA cache backend unhealthy, building without it"
          fi

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "iam-recon-ci"
          cache-on-failure: true
          save-if: ${{ github.ref == 'refs/heads/main' }}
          cache-all-crates: true

      - name: Format check
        run: cargo fmt -- --check
      - name: Type check
        run: cargo check --all-targets --locked
      - name: Clippy
        run: cargo clippy --all-targets --locked -- -W clippy::all
      - name: Unit + integration tests
        run: cargo test --locked

      - name: sccache stats
        if: env.RUSTC_WRAPPER == 'sccache'
        run: sccache --show-stats || true
