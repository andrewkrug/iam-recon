name: CI

# Runs on every push to main and every PR against main.
# Purpose: fast feedback on correctness. Does not build release binaries
# or publish anything — that's handled by release.yml.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: Check, Lint & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
      - name: Format check
        run: cargo fmt -- --check
      - name: Type check
        run: cargo check --all-targets
      - name: Clippy
        run: cargo clippy --all-targets -- -W clippy::all
      - name: Unit + integration tests
        run: cargo test
